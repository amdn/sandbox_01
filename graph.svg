<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 220 80">

  <!-- Edge -->
  <line x1="60" y1="40" x2="160" y2="40" stroke="#555" stroke-width="2" />

  <!-- Node 1 -->
  <a xlink:href="https://example.com/node1" target="_blank">
    <circle cx="60" cy="40" r="18" fill="#4f83ff" />
    <text x="60" y="44" text-anchor="middle" font-size="10" fill="white">Node 1</text>
  </a>

  <!-- Node 2 -->
  <a xlink:href="https://example.com/node2" target="_blank">
    <circle cx="160" cy="40" r="18" fill="#43a047" />
    <text x="160" y="44" text-anchor="middle" font-size="10" fill="white">Node 2</text>
  </a>

</svg>
